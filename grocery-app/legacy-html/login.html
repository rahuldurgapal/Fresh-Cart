<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FreshCart</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Simplified Header -->
    <header>
        <div class="nav-container" style="justify-content: center;">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-leaf"></i> FreshCart
            </a>
        </div>
    </header>

    <!-- Auth Section -->
    <main class="auth-wrapper fade-in">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your grocery shopping</p>
            </div>
            
            <form action="index.html" method="GET">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-wrap">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-auth">Sign In</button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create an Account</a></p>
            </div>
        </div>
    </main>

</body>
</html>
